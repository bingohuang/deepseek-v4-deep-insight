<script type="text/babel">
// ━━━━━━ Inline Animation Engine ━━━━━━
const { createContext, useContext, useState, useEffect, useRef, useCallback } = React;

const TimeContext = createContext({ time: 0, duration: 60, playing: false });
const SpriteContext = createContext(null);

const Easing = {
  linear: t => t,
  easeIn: t => t * t,
  easeOut: t => 1 - (1 - t) * (1 - t),
  easeInOut: t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2,
  expoOut: t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t),
  overshoot: t => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  spring: t => {
    const c = (2 * Math.PI) / 3;
    return t === 0 ? 0 : t === 1 ? 1 : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c) + 1;
  },
};

function interpolate(t, input, output, easing) {
  const [inStart, inEnd] = input;
  const [outStart, outEnd] = output;
  if (t <= inStart) return outStart;
  if (t >= inEnd) return outEnd;
  let progress = (t - inStart) / (inEnd - inStart);
  if (easing) progress = easing(progress);
  return outStart + (outEnd - outStart) * progress;
}

function useTime() { return useContext(TimeContext).time; }
function useSprite() {
  const sprite = useContext(SpriteContext);
  return sprite || { t: 0, elapsed: 0, duration: 0 };
}

const DURATION = 60;
const W = 1920, H = 1080;

// Brand colors
const C = {
  blue: '#4D6BFE',
  blueFaint: 'rgba(77,107,254,0.08)',
  blueMid: 'rgba(77,107,254,0.18)',
  ink: '#1A1A1A',
  gray: '#5A5A5A',
  light: '#999',
  bg: '#FAFAFA',
  bgDark: '#0F0F0F',
  white: '#FFFFFF',
  gridLine: 'rgba(77,107,254,0.04)',
};

// ━━━━━━ Stage Component ━━━━━━
function Stage({ duration = DURATION, width = W, height = H, children, bgColor = C.bg }) {
  const [time, setTime] = useState(0);
  const [playing, setPlaying] = useState(true);
  const [scale, setScale] = useState(1);
  const rafRef = useRef(null);

  const effectiveLoop = (typeof window !== 'undefined' && window.__recording) ? false : true;

  useEffect(() => {
    function updateScale() {
      const vw = window.innerWidth;
      const vh = window.innerHeight - 56;
      const s = Math.min(vw / width, vh / height);
      setScale(s);
    }
    updateScale();
    window.addEventListener('resize', updateScale);
    return () => window.removeEventListener('resize', updateScale);
  }, [width, height]);

  useEffect(() => {
    if (!playing) return;
    let cancelled = false;
    let last = null;

    function tick(now) {
      if (cancelled) return;
      if (last === null) {
        last = now;
        window.__ready = true;
      }
      const delta = (now - last) / 1000;
      last = now;
      setTime(prev => {
        const next = prev + delta;
        if (next >= duration) return effectiveLoop ? 0 : duration - 0.001;
        return next;
      });
      rafRef.current = requestAnimationFrame(tick);
    }

    const startAfterFonts = () => {
      if (cancelled) return;
      rafRef.current = requestAnimationFrame(tick);
    };
    if (typeof document !== 'undefined' && document.fonts && document.fonts.ready) {
      document.fonts.ready.then(startAfterFonts);
    } else {
      startAfterFonts();
    }
    return () => { cancelled = true; cancelAnimationFrame(rafRef.current); };
  }, [playing, duration, effectiveLoop]);

  const handleScrub = useCallback((e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    setTime(Math.max(0, Math.min(duration, ratio * duration)));
  }, [duration]);

  const progress = time / duration;
  const ctx = { time, duration, playing, setPlaying, setTime };

  return (
    <TimeContext.Provider value={ctx}>
      <div style={{ position: 'fixed', inset: 0, background: '#0a0a0a', display: 'flex', flexDirection: 'column', fontFamily: '-apple-system, sans-serif' }}>
        <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
          <div style={{ position: 'absolute', top: '50%', left: '50%', transformOrigin: 'center center', background: bgColor, overflow: 'hidden', width, height, transform: `translate(-50%, -50%) scale(${scale})` }}>
            {children}
          </div>
        </div>
        <div className="no-record" style={{ position: 'fixed', bottom: 0, left: 0, right: 0, background: 'rgba(0,0,0,0.8)', backdropFilter: 'blur(10px)', padding: '12px 20px', display: 'flex', alignItems: 'center', gap: 16, color: '#fff', fontSize: 12, zIndex: 100 }}>
          <button style={{ background: 'none', border: '1px solid rgba(255,255,255,0.3)', color: '#fff', padding: '6px 14px', borderRadius: 4, cursor: 'pointer', fontSize: 12 }} onClick={() => setPlaying(p => !p)}>{playing ? '⏸' : '▶'}</button>
          <span style={{ fontFamily: 'ui-monospace, monospace', fontVariantNumeric: 'tabular-nums', minWidth: 90 }}>{time.toFixed(1)}s / {duration}s</span>
          <div style={{ flex: 1, height: 4, background: 'rgba(255,255,255,0.2)', borderRadius: 2, position: 'relative', cursor: 'pointer' }} onMouseDown={handleScrub}>
            <div style={{ position: 'absolute', top: 0, left: 0, height: '100%', background: C.blue, borderRadius: 2, pointerEvents: 'none', width: `${progress * 100}%` }} />
          </div>
        </div>
      </div>
    </TimeContext.Provider>
  );
}

function Sprite({ start = 0, end, children, style }) {
  const { time } = useContext(TimeContext);
  const actualEnd = end == null ? Infinity : end;
  if (time < start || time >= actualEnd) return null;
  const dur = actualEnd - start;
  const elapsed = time - start;
  const t = dur === 0 ? 1 : Math.max(0, Math.min(1, elapsed / dur));
  return (
    <SpriteContext.Provider value={{ t, elapsed, duration: dur, start, end: actualEnd }}>
      <div style={{ position: 'absolute', inset: 0, ...style }}>{children}</div>
    </SpriteContext.Provider>
  );
}

// ━━━━━━ Helper Components ━━━━━━

function FadeIn({ delay = 0, children, style }) {
  const { elapsed } = useSprite();
  const opacity = interpolate(elapsed, [delay, delay + 0.6], [0, 1], Easing.expoOut);
  const y = interpolate(elapsed, [delay, delay + 0.6], [20, 0], Easing.expoOut);
  return <div style={{ opacity, transform: `translateY(${y}px)`, ...style }}>{children}</div>;
}

function RiseIn({ delay = 0, from = 40, children, style }) {
  const { elapsed } = useSprite();
  const opacity = interpolate(elapsed, [delay, delay + 0.7], [0, 1], Easing.expoOut);
  const y = interpolate(elapsed, [delay, delay + 0.7], [from, 0], Easing.expoOut);
  return <div style={{ opacity, transform: `translateY(${y}px)`, ...style }}>{children}</div>;
}

function CountUp({ value, delay = 0, duration = 1.2, style }) {
  const { elapsed } = useSprite();
  const progress = interpolate(elapsed, [delay, delay + duration], [0, 1], Easing.expoOut);
  const current = Math.round(value * progress);
  return <span style={style}>{current}</span>;
}

// ━━━━━━ SCENE 1: COVER (0-8s) ━━━━━━
function SceneCover() {
  const time = useTime();

  // Background grid fade
  const gridOpacity = interpolate(time, [0, 2], [0, 1], Easing.expoOut);

  // Title parts
  const kickerOpacity = interpolate(time, [0.5, 1.5], [0, 1], Easing.expoOut);
  const kickerY = interpolate(time, [0.5, 1.5], [15, 0], Easing.expoOut);
  const title1Opacity = interpolate(time, [1.2, 2.2], [0, 1], Easing.expoOut);
  const title1Y = interpolate(time, [1.2, 2.2], [30, 0], Easing.expoOut);
  const title2Opacity = interpolate(time, [2.0, 3.0], [0, 1], Easing.expoOut);
  const title2Y = interpolate(time, [2.0, 3.0], [30, 0], Easing.expoOut);

  // Four hero numbers stagger
  const heroDelays = [3.0, 3.4, 3.8, 4.2];

          <span style={{ fontSize: 13, letterSpacing: '0.22em', color: C.gray, textTransform: 'uppercase' }}>DeepSeek-V4 · Preview Release</span>
        </div>
      </div>

      {/* Center title */}
      <div style={{ position: 'absolute', top: '38%', left: '50%', transform: 'translate(-50%, -50%)', textAlign: 'center', width: 1600 }}>
        <div style={{ opacity: kickerOpacity, transform: `translateY(${kickerY}px)`, fontSize: 14, letterSpacing: '0.32em', color: C.blue, textTransform: 'uppercase', fontWeight: 600, marginBottom: 32 }}>
          2026 · Preview Release
        </div>
        <div style={{ opacity: title1Opacity, transform: `translateY(${title1Y}px)`, fontFamily: '"Source Serif 4", "Noto Serif SC", Georgia, serif', fontSize: 108, lineHeight: 1.08, fontWeight: 700, letterSpacing: '-0.02em', marginBottom: 8 }}>
          迈入<span style={{ color: C.blue, fontStyle: 'italic' }}>百万上下文</span>
        </div>
        <div style={{ opacity: title2Opacity, transform: `translateY(${title2Y}px)`, fontFamily: '"Source Serif 4", "Noto Serif SC", Georgia, serif', fontSize: 108, lineHeight: 1.08, fontWeight: 700, letterSpacing: '-0.02em' }}>
          普惠时代
        </div>
      </div>

      {/* Four hero numbers */}
      <div style={{ position: 'absolute', top: 660, left: 120, right: 120, display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 0, borderTop: '2px solid #1A1A1A' }}>
        {heroData.map((h, i) => {
          const op = interpolate(time, [heroDelays[i], heroDelays[i] + 0.8], [0, 1], Easing.expoOut);
          const y = interpolate(time, [heroDelays[i], heroDelays[i] + 0.8], [20, 0], Easing.expoOut);
          return (
            <div key={i} style={{ opacity: op, transform: `translateY(${y}px)`, padding: '28px 32px 28px 0', borderRight: i < 3 ? '1px solid rgba(26,26,26,0.12)' : 'none' }}>

              <div style={{ fontFamily: '"Source Serif 4", Georgia, serif', fontSize: 56, fontWeight: 700, color: C.blue, lineHeight: 1, letterSpacing: '-0.02em', fontVariantNumeric: 'tabular-nums', marginBottom: 8 }}>{h.value}</div>
              <div style={{ fontSize: 13, color: C.gray, lineHeight: 1.5 }}>{h.desc}</div>
            </div>
          );
        })}
      </div>

      {/* Meta bottom */}
      <div style={{ position: 'absolute', bottom: 60, left: 120, right: 120, display: 'flex', justifyContent: 'space-between', fontSize: 13, letterSpacing: '0.18em', color: C.light, textTransform: 'uppercase', opacity: metaOpacity }}>
        <span>1.6T Parameters · 49B Active · 61 Layers</span>
        <span>Open Weights · FP4 QAT</span>
      </div>
    </div>
  );
}

// ━━━━━━ SCENE 2: ARCHITECTURE (8-22s) ━━━━━━
function SceneArchitecture() {

  // Sub-scenes
  const t = time - 8; // local time 0-14

  // MoE grid (0-4s local)
  const moeOpacity = interpolate(t, [0, 1.0], [0, 1], Easing.expoOut);

    const row = Math.floor(i / 24);
    const col = i % 24;

      ? interpolate(t, [cellDelay, cellDelay + 0.3], [0.3, 1], Easing.overshoot)
      : interpolate(t, [cellDelay, cellDelay + 0.4], [0.5, 1], Easing.expoOut);
    experts.push(
      <div key={i} style={{
        width: 22, height: 22, borderRadius: 3,
        background: isActive ? C.blue : '#E8E8E8',
        opacity: cellOp, transform: `scale(${scale})`,
        transition: 'none',
      }} />
    );
  }

  // Sparse annotation (3-5s local)
  const sparseOp = interpolate(t, [3.0, 4.0], [0, 1], Easing.expoOut);

  // mHC transition (5-9s local)
  const mhcTitleOp = interpolate(t, [5.0, 6.0], [0, 1], Easing.expoOut);
  const mhcTitleY = interpolate(t, [5.0, 6.0], [25, 0], Easing.expoOut);

  const baselineData = [0.4, 0.5, 0.6, 0.9, 1.2, 0.8, 0.5, 0.4, 0.6, 1.5, 0.7, 0.5, 0.4, 0.6, 0.8];
  const mhcData =     [0.4, 0.45, 0.5, 0.52, 0.55, 0.53, 0.51, 0.50, 0.49, 0.48, 0.47, 0.46, 0.45, 0.44, 0.43];

  // Hybrid attention (9-13s local)
  const hybridOp = interpolate(t, [9.0, 10.0], [0, 1], Easing.expoOut);

  // Fade out

  return (

        <div style={{ fontSize: 13, letterSpacing: '0.24em', color: C.blue, fontWeight: 600, textTransform: 'uppercase', marginBottom: 16, display: 'flex', alignItems: 'center', gap: 12 }}>
          <span style={{ width: 36, height: 2, background: C.blue, display: 'inline-block' }}></span>

          <span style={{ display: 'inline-block', width: 12, height: 12, borderRadius: 2, background: '#E8E8E8', verticalAlign: 'middle', marginRight: 6 }}></span> 377 个路由专家静默
        </div>

      {/* Sparse economics */}
