<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #0a0a0a;
    overflow: hidden;
    font-family: -apple-system, "PingFang SC", sans-serif;
  }
  #stage {
    position: fixed;
    top: 50%; left: 50%;
    transform-origin: top left;
    will-change: transform;
    background: #fff;
    box-shadow: 0 10px 60px rgba(0,0,0,0.4);
  }
  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #fff;
  }
  .counter {
    position: fixed;
    bottom: 20px; right: 20px;
    background: rgba(0,0,0,0.65);
    color: #fff;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
    z-index: 100;
    user-select: none;
    opacity: 0.7;
    transition: opacity 0.2s;
    max-width: 520px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .counter:hover { opacity: 1; }
  .counter .label { color: rgba(255,255,255,0.7); margin-left: 8px; }

  .nav-zone {
    position: fixed;
    top: 0; bottom: 0;
    width: 12%;
    cursor: pointer;
    z-index: 50;
  }
  .nav-zone.left  { left: 0; }
  .nav-zone.right { right: 0; }
  .nav-hint {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 44px; height: 44px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .nav-zone.left  .nav-hint { left: 20px; }
  .nav-zone.right .nav-hint { right: 20px; }
  .nav-zone:hover .nav-hint { opacity: 1; }

  /* TOC 侧边栏 */
  .toc-toggle {
    position: fixed;
    top: 20px; left: 20px;
    background: rgba(0,0,0,0.65);
    color: #fff;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    letter-spacing: 0.1em;
    cursor: pointer;
    z-index: 120;
    user-select: none;
    opacity: 0.7;
    transition: opacity 0.2s;
    text-transform: uppercase;
  }
  .toc-toggle:hover { opacity: 1; }
  .toc-panel {
    position: fixed;
    top: 0; left: -360px; bottom: 0;
    width: 340px;
    background: #0f0f0f;
    border-right: 1px solid rgba(255,255,255,0.1);
    transition: left 0.25s ease;
    z-index: 110;
    overflow-y: auto;
    padding: 56px 0 20px;
    color: #ddd;
  }
  .toc-panel.open { left: 0; }
  .toc-item {
    padding: 8px 20px;
    font-size: 12px;
    line-height: 1.4;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    border-left: 2px solid transparent;
    font-variant-numeric: tabular-nums;
  }
  .toc-item:hover {
    color: #fff;
    background: rgba(255,255,255,0.04);
  }
  .toc-item.active {
    color: #4D6BFE;
    border-left-color: #4D6BFE;
    background: rgba(77,107,254,0.08);
  }

  @media print {
    @page { size: 1920px 1080px; margin: 0; }
    html, body { background: #fff; overflow: visible; height: auto; }
    #stage { position: static; transform: none !important; box-shadow: none; }
    .counter, .nav-zone, .toc-toggle, .toc-panel { display: none !important; }
    .print-stack { display: block; }
    .print-stack iframe {
      width: 1920px;
      height: 1080px;
      page-break-after: always;
      display: block;
    }
  }
</style>

<body>

<div id="stage">
  <iframe id="frame" src="about:blank"></iframe>
</div>

<div class="nav-zone left"  id="navL"><div class="nav-hint">‹</div></div>
<div class="nav-zone right" id="navR"><div class="nav-hint">›</div></div>
<div class="counter" id="counter">1 / 1</div>

<div class="toc-toggle" id="tocToggle">☰ Index</div>
<div class="toc-panel" id="tocPanel"></div>

<div class="print-stack" id="printStack" style="display:none;"></div>

<script>
(function () {
  const W = window.DECK_WIDTH || 1920;
  const H = window.DECK_HEIGHT || 1080;
  const deck = window.DECK_MANIFEST || [];
  const stage = document.getElementById('stage');
  const frame = document.getElementById('frame');
  const counter = document.getElementById('counter');
  const printStack = document.getElementById('printStack');
  const tocPanel = document.getElementById('tocPanel');
  const tocToggle = document.getElementById('tocToggle');
  const storageKey = 'deck-v2-index-' + location.pathname;
  let current = 0;

  stage.style.width  = W + 'px';
  stage.style.height = H + 'px';

  function fit() {
    const s = Math.min(window.innerWidth / W, window.innerHeight / H);
    const x = (window.innerWidth  - W * s) / 2;
    const y = (window.innerHeight - H * s) / 2;
    stage.style.transform = `translate(${x}px, ${y}px) scale(${s})`;
    stage.style.top = '0';
    stage.style.left = '0';
  }

  // 点击 iframe 内容后自动恢复焦点，保证快捷键不失效
  frame.addEventListener('load', function () {
    try {
      frame.contentDocument.addEventListener('pointerup', function () {
        window.focus();
      });
    } catch (_) {}
  });

  function show(idx) {
    if (idx < 0 || idx >= deck.length) return;
    current = idx;
    frame.src = deck[idx].file;
    counter.innerHTML = `${idx + 1} / ${deck.length} <span class="label">${deck[idx].label || ''}</span>`;
    try { localStorage.setItem(storageKey, String(idx)); } catch (_) {}
    if (location.hash !== '#' + (idx + 1)) {
      history.replaceState(null, '', '#' + (idx + 1));
    }
    document.querySelectorAll('.toc-item').forEach((el, i) => {
      el.classList.toggle('active', i === idx);
      if (i === idx) el.scrollIntoView({ block: 'nearest' });
    });
  }

  function next() { show((current + 1) % deck.length); }
  function prev() { show((current - 1 + deck.length) % deck.length); }

  // Build TOC
  deck.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'toc-item';
    el.textContent = item.label || `Page ${i + 1}`;
    el.addEventListener('click', () => { show(i); tocPanel.classList.remove('open'); });
    tocPanel.appendChild(el);
  });
  tocToggle.addEventListener('click', () => tocPanel.classList.toggle('open'));
  document.addEventListener('click', (e) => {
    if (!tocPanel.contains(e.target) && !tocToggle.contains(e.target)) {
      tocPanel.classList.remove('open');
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch (e.key) {
      case 'ArrowRight': case ' ': case 'PageDown': e.preventDefault(); next(); break;
      case 'ArrowLeft':  case 'PageUp':              e.preventDefault(); prev(); break;
      case 'Home':                                    e.preventDefault(); show(0); break;
      case 'End':                                     e.preventDefault(); show(deck.length - 1); break;
      case '0': case '1': case '2': case '3': case '4':
      case '5': case '6': case '7': case '8': case '9':
        e.preventDefault();
        show(e.key === '0' ? deck.length - 1 : parseInt(e.key, 10) - 1);
        break;
      case 'p': case 'P':                             window.print(); break;
      case 'i': case 'I':                             tocPanel.classList.toggle('open'); break;
    }
  });

  document.getElementById('navL').addEventListener('click', prev);
  document.getElementById('navR').addEventListener('click', next);
  window.addEventListener('resize', fit);
  window.addEventListener('hashchange', () => {
    const m = location.hash.match(/^#(\d+)$/);
    if (m) show(parseInt(m[1], 10) - 1);
  });

  const hashMatch = location.hash.match(/^#(\d+)$/);
  if (hashMatch) current = Math.min(parseInt(hashMatch[1], 10) - 1, deck.length - 1);
  else try {
    const v = parseInt(localStorage.getItem(storageKey), 10);
    if (!isNaN(v) && v >= 0 && v < deck.length) current = v;
  } catch (_) {}
  fit();
  show(current);

  window.addEventListener('beforeprint', () => {
    printStack.innerHTML = '';
    deck.forEach(item => {
      const f = document.createElement('iframe');
      f.src = item.file;
      printStack.appendChild(f);
    });
    printStack.style.display = 'block';
    document.getElementById('stage').style.display = 'none';
  });
  window.addEventListener('afterprint', () => {
    printStack.innerHTML = '';
    printStack.style.display = 'none';
    document.getElementById('stage').style.display = '';
  });
})();
</script>

</body>
