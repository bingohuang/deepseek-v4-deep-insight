<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>DeepSeek-V4 · 不诱于誉，不恐于诽</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1920px; height: 1080px; overflow: hidden;
    background: #FFFFFF; color: #1A1A1A;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .s70-stage { position: relative; width: 1920px; height: 1080px; background: #FFFFFF; }

  .s70-masthead {
    position: absolute; top: 50px; left: 120px; right: 120px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .s70-masthead-left { display: flex; align-items: center; gap: 16px; }
  .s70-masthead-left img { height: 22px; opacity: 0.5; }
  .s70-masthead-left span {
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: #BBB;
  }
  .s70-masthead-right { font-size: 12px; letter-spacing: 0.18em; color: #CCC; }

  /* 垂直居中的金句区 */
  .s70-center {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  .s70-kicker {
    font-size: 12px; letter-spacing: 0.32em; text-transform: uppercase;
    color: #4D6BFE; font-weight: 600; margin-bottom: 64px;
    display: flex; align-items: center; gap: 20px;
  }
  .s70-kicker::before,
  .s70-kicker::after {
    content: ""; width: 48px; height: 1px; background: #4D6BFE;
  }

  .s70-verse {
    font-family: "Source Serif 4", "Noto Serif SC", "Songti SC", "STSong", serif;
    font-size: 108px; line-height: 1.45; font-weight: 500;
    color: #1A1A1A; text-align: center;
    letter-spacing: 0.12em;
  }
  .s70-verse .hi { color: #4D6BFE; }

  .s70-line {
    width: 80px; height: 2px; background: #1A1A1A;
    margin: 80px auto 36px auto;
  }

  .s70-source {
    font-family: "Source Serif 4", Georgia, serif;
    font-style: italic;
    font-size: 20px; color: #5A5A5A; text-align: center;
    letter-spacing: 0.08em;
    line-height: 1.7;
  }
  .s70-source strong {
    font-style: normal; color: #1A1A1A; font-weight: 500;
  }

  .s70-footer {
    position: absolute; left: 120px; right: 120px; bottom: 50px;
    display: flex; justify-content: space-between;
    font-size: 12px; letter-spacing: 0.14em; color: #CCC; text-transform: uppercase;
  }
  .s70-watermark { position: absolute; right: 60px; bottom: 50px; opacity: 0.05; }
  .s70-watermark img { width: 120px; }
</style>
</head>
<body>
<div class="s70-stage">
  <div class="s70-masthead">
    <div class="s70-masthead-left">
      <img src="../assets/deepseek-logo.png" alt="DeepSeek">
      <span>DeepSeek-V4 · 技术深度解读</span>
    </div>
    <div class="s70-masthead-right">70 · 金句</div>
  </div>

  <div class="s70-center">
    <div class="s70-kicker">Chapter 10 · 情感收尾</div>

    <div class="s70-verse">
      <span class="hi">不诱于誉</span>，不恐于诽，<br>
      率道而行，<span class="hi">端然正己</span>。
    </div>

    <div class="s70-line"></div>

    <div class="s70-source">
      出自 <strong>《荀子 · 非十二子》</strong><br>
      被 <strong>DeepSeek</strong> 写在 V4 官方发布文的结尾
    </div>
  </div>

  <div class="s70-footer">
    <div>技术深度解读 · CHAPTER 10</div>
    <div>70 / 72</div>
  </div>
  <div class="s70-watermark"><img src="../assets/deepseek-logo.png" alt=""></div>
</div>
</body>
</html>
