<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>DeepSeek-V4 · 转折</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1920px; height: 1080px; overflow: hidden;
    background: #FFFFFF; color: #1A1A1A;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .s51-stage { position: relative; width: 1920px; height: 1080px; background: #FFFFFF; }
  .s51-masthead {
    position: absolute; top: 50px; left: 120px; right: 120px;
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 20px; border-bottom: 1px solid rgba(26,26,26,0.08);
  }
  .s51-masthead-left { display: flex; align-items: center; gap: 16px; }
  .s51-masthead-left img { height: 26px; }
  .s51-masthead-left span {
    font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase; color: #5A5A5A;
  }
  .s51-masthead-right { font-size: 13px; letter-spacing: 0.18em; color: #999; }

  .s51-chapter {
    position: absolute; left: 120px; top: 160px;
    font-size: 13px; letter-spacing: 0.24em; text-transform: uppercase;
    color: #4D6BFE; font-weight: 600;
  }

  .s51-but {
    position: absolute; left: 120px; top: 380px;
    font-family: "Source Serif 4", "Noto Serif SC", Georgia, serif;
    font-size: 320px; line-height: 0.85; font-weight: 700;
    color: #1A1A1A; letter-spacing: -0.04em;
  }
  .s51-but .period {
    color: #4D6BFE;
  }

  .s51-sub {
    position: absolute; left: 120px; right: 120px; top: 720px;
    font-family: "Source Serif 4", "Noto Serif SC", Georgia, serif;
    font-size: 44px; line-height: 1.3; color: #5A5A5A;
    max-width: 1600px; font-weight: 400; font-style: italic;
  }
  .s51-sub strong { color: #1A1A1A; font-style: normal; font-weight: 600; }

  .s51-dotline {
    position: absolute; left: 120px; top: 360px; width: 80px;
    height: 2px; background: #4D6BFE;
  }

  .s51-footer {
    position: absolute; left: 120px; right: 120px; bottom: 50px;
    display: flex; justify-content: space-between;
    font-size: 13px; letter-spacing: 0.14em; color: #999; text-transform: uppercase;
  }
  .s51-watermark { position: absolute; right: 60px; bottom: 50px; opacity: 0.08; }
  .s51-watermark img { width: 120px; }
</style>
</head>
<body>
<div class="s51-stage">
  <div class="s51-masthead">
    <div class="s51-masthead-left">
      <img src="../assets/deepseek-logo.png" alt="DeepSeek">
      <span>DeepSeek-V4 · 技术深度解读</span>
    </div>
    <div class="s51-masthead-right">08 · 不擅长什么</div>
  </div>

  <div class="s51-chapter">CHAPTER 08 · 不擅长什么</div>
  <div class="s51-dotline"></div>

  <div class="s51-but">但是<span class="period">。</span></div>

  <div class="s51-sub">
    一旦离开「标准答案」这个安全区，<strong>模型的性格</strong>就会露出来。
  </div>

  <div class="s51-footer">
    <div>技术深度解读 · CHAPTER 08</div>
    <div>51 / 72</div>
  </div>
  <div class="s51-watermark"><img src="../assets/deepseek-logo.png" alt=""></div>
</div>
</body>
</html>
